name: Build iOS IPA (unsigned, for AltStore)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  build-ios:
    name: Build sideloadable IPA
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods (if Podfile exists)
        run: |
          if [ -f ios/Podfile ]; then
            cd ios
            pod install --repo-update
          fi

      - name: Build iOS release (no codesign)
        run: |
          flutter build ipa --release --no-codesign \
            || flutter build ios --release --no-codesign

      - name: Package sideloadable IPA
        run: |
          APP_PATH=""
          if [ -d "build/ios/archive/Runner.xcarchive/Product/Applications/Runner.app" ]; then
            APP_PATH="build/ios/archive/Runner.xcarchive/Product/Applications/Runner.app"
          elif [ -d "build/ios/iphoneos/Runner.app" ]; then
            APP_PATH="build/ios/iphoneos/Runner.app"
          else
            APP_PATH="$(find build/ios -type d -name Runner.app | head -n 1)"
          fi

          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "Runner.app not found"
            find build/ios -maxdepth 5 -type d 2>/dev/null || true
            exit 1
          fi

          echo "Using app bundle: $APP_PATH"
          mkdir -p build/ios/sideload/Payload
          cp -R "$APP_PATH" build/ios/sideload/Payload/
          mkdir -p build/ios/ipa
          (
            cd build/ios/sideload
            zip -qry ../ipa/goal-path-unsigned.ipa Payload
          )
          ls -lh build/ios/ipa/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: goal-path-ios-ipa
          path: build/ios/ipa/goal-path-unsigned.ipa
          retention-days: 30

      - name: Upload on release (optional)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/ios/ipa/goal-path-unsigned.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
