name: Build iOS IPA (unsigned, for AltStore)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  build-ios:
    name: Build sideloadable IPA
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods (if Podfile exists)
        run: |
          if [ -f ios/Podfile ]; then
            cd ios
            pod install --repo-update
          fi

      - name: Build iOS release (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package sideloadable IPA
        run: |
          set -euo pipefail

          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Runner.app not found at $APP_PATH"
            find build/ios -maxdepth 5 -type d 2>/dev/null || true
            exit 1
          fi

          echo "=== Info.plist ==="
          plutil -lint "$APP_PATH/Info.plist"
          plutil -p "$APP_PATH/Info.plist" | head -n 30

          if grep -q '\$(' "$APP_PATH/Info.plist"; then
            echo "ERROR: Info.plist still has unresolved Xcode variables"
            grep '\$(' "$APP_PATH/Info.plist" || true
            exit 1
          fi

          EXEC_NAME="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$APP_PATH/Info.plist")"
          if [ ! -f "$APP_PATH/$EXEC_NAME" ]; then
            echo "ERROR: Executable '$EXEC_NAME' not found in app bundle"
            ls -la "$APP_PATH"
            exit 1
          fi

          echo "Using app bundle: $APP_PATH (executable: $EXEC_NAME)"
          rm -rf build/ios/sideload
          mkdir -p build/ios/sideload/Payload
          ditto "$APP_PATH" build/ios/sideload/Payload/Runner.app

          echo "Ad-hoc signing for AltStore..."
          codesign --force --sign - --deep build/ios/sideload/Payload/Runner.app
          codesign --verify --deep --strict build/ios/sideload/Payload/Runner.app

          mkdir -p build/ios/ipa
          (
            cd build/ios/sideload
            zip -9yr ../ipa/Plime.ipa Payload
          )

          echo "IPA contents:"
          unzip -l build/ios/ipa/Plime.ipa | head -n 25
          ls -lh build/ios/ipa/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: plime-ios-ipa
          path: build/ios/ipa/Plime.ipa
          retention-days: 30

      - name: Upload on release (optional)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/ios/ipa/Plime.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
