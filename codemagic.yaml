# Сборка IPA для установки через AltStore
# Документация: https://docs.codemagic.io/flutter/flutter-projects/
workflows:
  ios-release:
    name: iOS Release (AltStore)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.goalpath.app
      vars:
        BUNDLE_ID: com.goalpath.app
    scripts:
      - name: Инициализация iOS-проекта
        script: |
          if [ ! -d "ios" ]; then
            flutter create . --org com.goalpath --project-name goal_path --platforms=ios
          fi
      - name: Установка зависимостей
        script: |
          flutter pub get
      - name: Сборка IPA
        script: |
          flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true
